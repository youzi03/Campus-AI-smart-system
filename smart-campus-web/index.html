<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧校园信息管理系统</title>

  <!-- Element Plus CSS -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css" />

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="src/styles/theme.css" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <div id="app">
    <div style="padding:40px;text-align:center;color:#909399;font-size:14px">
      🎓 智慧校园信息管理系统正在加载中...
    </div>
  </div>

  <!-- Vue 3 + Element Plus + Icons (CDN, IIFE 模式) -->
  <script src="https://unpkg.com/vue@3.4.0/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus@2.4.4/dist/index.full.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.js"></script>
  <!-- SheetJS (XLSX) - Excel 文件解析 -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

  <!-- 通用工具 -->
  <script src="src/utils/common.js"></script>

  <!-- 服务层（按业务拆分，对应后端服务） -->
  <script src="src/services/user-service.js"></script>
  <script src="src/services/course-service.js"></script>
  <script src="src/services/score-service.js"></script>
  <script src="src/services/notice-service.js"></script>
  <script src="src/services/dorm-service.js"></script>
  <script src="src/services/library-service.js"></script>

  <!-- 页面组件（按服务拆分，一个服务一个文件） -->
  <script src="src/pages/course-pages.js"></script>
  <script src="src/pages/score-pages.js"></script>
  <script src="src/pages/notice-pages.js"></script>
  <script src="src/pages/dorm-pages.js"></script>
  <script src="src/pages/library-pages.js"></script>

  <!-- 学生/教师页面 -->
  <script src="src/pages/user-pages.js"></script>

  <!-- 主应用 -->
  <script src="src/app.js"></script>
</body>
</html>
