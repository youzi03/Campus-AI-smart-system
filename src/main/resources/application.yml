server:
  port: 8080

spring:
  application:
    name: campus-ai-system

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/campus_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: campus_user
    password: Campus@2024
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# JWT 配置
jwt:
  secret: CampusAi2024SmartSystemSecretKeyForJWTTokenGenerationMustBe256BitsLong
  expiration: 86400000  # 24 小时（毫秒）

# 日志配置
logging:
  level:
    com.campus.ai: debug
    org.springframework.jdbc: debug
